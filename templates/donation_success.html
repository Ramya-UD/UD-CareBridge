<!DOCTYPE html>
<html>
<head>
    <title>Donation Successful</title>
    <style>
        body {
            background: linear-gradient(to right, #000000, #1a1a1a);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
        }

        .success-box {
            background: #111;
            width: 60%;
            margin: auto;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 20px gold;
        }

        h1 {
            color: #FFD700;
            font-size: 36px;
        }

        p {
            font-size: 18px;
            margin-top: 20px;
        }

        .quote {
            margin-top: 30px;
            font-style: italic;
            color: #FFD700;
        }

        a {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 25px;
            background: gold;
            color: black;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        a:hover {
            background: white;
        }
    </style>
</head>
<body>

    <div class="success-box">
        <h1>🎉 Donation Successful!</h1>

        <p>Thank you for your kindness and generosity.</p>
        <p>Your contribution will help feed children in need.</p>

        <div class="quote">
            “No act of kindness, no matter how small, is ever wasted.” 💛
        </div>

        <a href="/">Return to Home</a>
    </div>

</body>
</html>
