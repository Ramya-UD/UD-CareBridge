{% extends "base.html" %}

{% block content %}

<div class="page-home-bg">

    <section class="hero-section">

        <h1 class="hero-title">🤝Join CareBridge</h1>
        <p class="hero-subtitle">❤️Become a member of Helping Hand</p>

        <div class="about-card signup-card">

            <form method="POST" action="/signup" class="form-container">

                
                <div class="row">
                <input type="text"
       name="first_name"
       placeholder="First Name"
       required
       pattern="[A-Za-z ]+"
       title="Only letters allowed"
       autocomplete="given-name"
       oninput="this.value = this.value.replace(/[^A-Za-z ]/g, '')">

<input type="text"
       name="last_name"
       placeholder="Last Name"
       required
       pattern="[A-Za-z ]+"
       title="Only letters allowed"
       autocomplete="family-name"
       oninput="this.value = this.value.replace(/[^A-Za-z ]/g, '')">
                </div>

            <input type="number"
       name="age"
       placeholder="Age"
       required
       min="1"
       max="120"
       oninput="this.value = this.value.replace(/[^0-9]/g, '')">

                <select name="gender" required>
                    <option value="">Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>

    <select name="donor_type" required>
    <option value="">Donor Type</option>
    <option>Individual</option>
    <option>Restaurant</option>
    <option>NGO</option>
</select>

                <input type="email" name="email" placeholder="Email Address" required>
                

                <input type="password" name="password"
       placeholder="Password"
       minlength="4"
       required>

                <button type="submit" class="primary-btn">Sign Up ✨</button>

            

            </form>

        </div>

    </section>

</div>

{% endblock %}
